<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Utby Snabb App</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --meko-yellow: #FDC300;
            --meko-black: #1a1a1a;
            --bg-gray: #f8f9fa;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background-color: var(--bg-gray); padding-bottom: 80px; overflow-x: hidden; }

        /* الهيدر العلوي */
        header {
            background: var(--meko-black);
            padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
        }
        .brand { color: var(--meko-yellow); font-weight: 800; font-size: 1.4rem; }
        .header-icons i { color: white; margin-left: 15px; font-size: 1.2rem; cursor: pointer; transition: var(--transition); }
        .header-icons i:active { transform: scale(0.8); color: var(--meko-yellow); }

        /* شريط البحث التفاعلي */
        .search-bar { background: var(--meko-black); padding: 10px 15px; }
        .search-inner { display: flex; background: white; border-radius: 4px; overflow: hidden; height: 45px; }
        .search-inner input { flex: 1; border: none; padding: 0 15px; font-size: 0.9rem; outline: none; }
        .search-inner button { background: var(--meko-yellow); border: none; width: 50px; cursor: pointer; transition: 0.2s; }
        .search-inner button:active { background: #e5b100; transform: scale(0.9); }

        /* قسم الهيرو */
        .hero {
            height: 65vh;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1494976388531-d1058494cdd8?q=80&w=1000&auto=format&fit=crop') center/cover;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 20px; text-align: center; color: white;
        }
        .hero h1 { color: var(--meko-yellow); font-size: 1.8rem; font-weight: 800; margin-bottom: 30px; line-height: 1.2; }

        /* الأزرار التفاعلية */
        .btn-group { width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 12px; }
        .action-btn {
            background: rgba(255,255,255,0.15);
            border: 2px solid white;
            color: white;
            padding: 14px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 700;
            backdrop-filter: blur(8px);
            transition: var(--transition);
            cursor: pointer;
        }
        .action-btn:active {
            transform: scale(0.96);
            background: white;
            color: black;
        }

        /* شريط التنقل السفلي */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 70px;
            background: white; border-top: 1px solid #eee;
            display: flex; justify-content: space-around; align-items: center;
            padding-bottom: env(safe-area-inset-bottom); z-index: 1000;
        }
        .nav-item { 
            display: flex; flex-direction: column; align-items: center; 
            color: #888; text-decoration: none; font-size: 0.7rem; font-weight: 600;
            transition: 0.2s;
        }
        .nav-item i { font-size: 1.4rem; margin-bottom: 4px; }
        .nav-item.active { color: black; }
        .nav-item:active { transform: translateY(-3px); color: var(--meko-yellow); }

        /* نافذة الحجز المنبثقة (Modal) */
        .booking-modal {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 90vh;
            background: white; border-radius: 20px 20px 0 0;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.2);
            z-index: 2000; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 30px 20px;
        }
        .booking-modal.open { bottom: 0; }
        .close-bar { width: 40px; height: 5px; background: #ddd; border-radius: 10px; margin: 0 auto 20px; cursor: pointer; }

        /* لودر التحميل */
        .loader { display: none; margin-top: 10px; color: var(--meko-yellow); font-size: 0.8rem; font-weight: 700; }
        .spin { animation: spin 1s linear infinite; display: inline-block; margin-right: 5px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <header>
        <div class="brand">UTBY SNABB</div>
        <div class="header-icons">
            <i class="fa-regular fa-calendar-check" onclick="toggleBooking()"></i>
            <i class="fa-solid fa-location-dot"></i>
            <i class="fa-solid fa-cart-shopping"></i>
        </div>
    </header>

    <div class="search-bar">
        <div class="search-inner">
            <input type="text" id="regInput" placeholder="Vad letar du efter? (t.ex. ABC 123)">
            <button onclick="simulateSearch()"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>
        <div id="loadingStatus" class="loader"><span class="spin"><i class="fa-solid fa-circle-notch"></i></span> Söker i databasen...</div>
    </div>

    <main class="hero">
        <h1>Säkra din tid för<br>sommardäck & service</h1>
        <div class="btn-group">
            <div class="action-btn" onclick="toggleBooking()">Boka däckbyte</div>
            <div class="action-btn" onclick="alert('Öppnar tjänster...')">Se verkstadstjänster</div>
            <div class="action-btn" onclick="alert('Hittar närmaste verkstad...')">Hitta verkstad & butik</div>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active" onclick="setActive(this)">
            <i class="fa-solid fa-house"></i>
            <span>Hem</span>
        </a>
        <a href="#" class="nav-item" onclick="setActive(this)">
            <i class="fa-solid fa-grip"></i>
            <span>Sortiment</span>
        </a>
        <a href="#" class="nav-item" onclick="toggleBooking(); setActive(this)">
            <i class="fa-regular fa-calendar-days"></i>
            <span>Boka tid</span>
        </a>
        <a href="#" class="nav-item" onclick="setActive(this)">
            <i class="fa-solid fa-screwdriver-wrench"></i>
            <span>Verkstad</span>
        </a>
        <a href="#" class="nav-item" onclick="setActive(this)">
            <i class="fa-regular fa-user"></i>
            <span>Medlem</span>
        </a>
    </nav>

    <div id="bookingModal" class="booking-modal">
        <div class="close-bar" onclick="toggleBooking()"></div>
        <h2 style="margin-bottom: 20px;">Boka din tid</h2>
        <div style="display: grid; gap: 15px;">
            <input type="text" placeholder="Registreringsnummer" style="width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 1.1rem; text-transform: uppercase; font-weight: 700;">
            <select style="width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem;">
                <option>Välj tjänst...</option>
                <option>Originalservice</option>
                <option>Bromsbyte</option>
                <option>Däckbyte</option>
            </select>
            <button class="action-btn" style="background: var(--meko-yellow); color: black; border: none; width: 100%; font-size: 1.1rem;" onclick="confirmBooking()">Sök lediga tider</button>
        </div>
    </div>

    <script>
        // 1. وظيفة تغيير الحالة النشطة في شريط التنقل
        function setActive(element) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');
        }

        // 2. وظيفة فتح وإغلاق نافذة الحجز (Animation)
        function toggleBooking() {
            const modal = document.getElementById('bookingModal');
            modal.classList.toggle('open');
        }

        // 3. محاكاة البحث عن سيارة
        function simulateSearch() {
            const input = document.getElementById('regInput').value;
            const loader = document.getElementById('loadingStatus');
            
            if(input.trim() === "") return;

            loader.style.display = "block";
            
            setTimeout(() => {
                loader.style.display = "none";
                alert("Vi hittade information för: " + input.toUpperCase() + "\nVill du boka en tid?");
                toggleBooking();
            }, 1500);
        }

        // 4. تأكيد الحجز الوهمي
        function confirmBooking() {
            alert("Tack! Vi letar efter tider... Du kommer att omdirigeras.");
            toggleBooking();
        }

        // إغلاق النافذة عند الضغط خارجها (اختياري)
        window.onclick = function(event) {
            const modal = document.getElementById('bookingModal');
            if (event.target == modal) {
                toggleBooking();
            }
        }
    </script>
</body>
</html>
