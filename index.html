<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Utby Snabb | Din Verkstad</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --meko-yellow: #FDC300; /* لون ميكونومن الأصفر الشهير */
            --meko-black: #1a1a1a;
            --meko-gray: #f4f4f4;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { background-color: var(--white); overflow-x: hidden; padding-bottom: 70px; /* لمساحة شريط التنقل السفلي */ }

        /* الهيدر العلوي الأسود */
        header {
            background-color: var(--meko-black);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .brand-logo {
            color: var(--meko-yellow);
            font-size: 1.5rem;
            font-weight: 900;
            text-decoration: none;
        }
        .header-icons {
            color: var(--white);
            display: flex;
            gap: 20px;
            font-size: 1.2rem;
        }

        /* شريط البحث */
        .search-section {
            background-color: var(--meko-black);
            padding: 0 15px 15px 15px;
        }
        .search-container {
            display: flex;
            background: var(--white);
            border-radius: 4px;
            overflow: hidden;
        }
        .search-container input {
            flex: 1;
            border: none;
            padding: 12px 15px;
            font-size: 0.9rem;
            outline: none;
        }
        .search-btn {
            background-color: var(--meko-yellow);
            border: none;
            padding: 0 15px;
            cursor: pointer;
            font-size: 1.1rem;
        }

        /* منطقة الهيرو (الصورة) */
        .hero-section {
            position: relative;
            height: 75vh;
            background: url('https://images.unsplash.com/photo-1494976388531-d1058494cdd8?q=80&w=1000&auto=format&fit=crop') center/cover no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: var(--white);
            padding: 20px;
        }
        /* تفتيح الصورة قليلاً لتظهر الأزرار */
        .hero-section::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.2);
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            width: 100%;
        }

        .hero-content h1 {
            color: var(--meko-yellow);
            font-size: 1.8rem;
            font-weight: 900;
            margin-bottom: 25px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .btn-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 300px;
            margin: 0 auto;
        }

        .meko-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid var(--white);
            color: var(--white);
            padding: 12px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            backdrop-filter: blur(5px);
            transition: 0.3s;
        }
        .meko-btn:active {
            background: var(--white);
            color: #000;
        }

        /* شريط التنقل السفلي (Bottom Nav) */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--white);
            display: flex;
            justify-content: space-around;
            padding: 10px 0 25px 0; /* مساحة إضافية لهواتف الآيفون الحديثة */
            border-top: 1px solid #ddd;
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #666;
            font-size: 0.7rem;
            font-weight: 500;
        }

        .nav-item i {
            font-size: 1.3rem;
            margin-bottom: 4px;
        }

        .nav-item.active {
            color: #000;
        }

    </style>
</head>
<body>

    <header>
        <a href="#" class="brand-logo">Utby Snabb</a>
        <div class="header-icons">
            <i class="fa-regular fa-calendar-check"></i>
            <i class="fa-solid fa-location-dot"></i>
            <i class="fa-solid fa-cart-shopping"></i>
        </div>
    </header>

    <div class="search-section">
        <div class="search-container">
            <input type="text" placeholder="Vad letar du efter?">
            <button class="search-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>
    </div>

    <main class="hero-section">
        <div class="hero-content">
            <h1>Säkra din tid för service & däck</h1>
            <div class="btn-stack">
                <a href="#" class="meko-btn">Boka däckbyte</a>
                <a href="#" class="meko-btn">Se verkstadstjänster</a>
                <a href="#" class="meko-btn">Hitta verkstad & butik</a>
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active">
            <i class="fa-solid fa-house"></i>
            <span>Hem</span>
        </a>
        <a href="#" class="nav-item">
            <i class="fa-solid fa-grip"></i>
            <span>Sortiment</span>
        </a>
        <a href="#" class="nav-item">
            <i class="fa-regular fa-calendar-days"></i>
            <span>Boka tid</span>
        </a>
        <a href="#" class="nav-item">
            <i class="fa-solid fa-screwdriver-wrench"></i>
            <span>Verkstad</span>
        </a>
        <a href="#" class="nav-item">
            <i class="fa-regular fa-user"></i>
            <span>Medlem</span>
        </a>
    </nav>

</body>
</html>
