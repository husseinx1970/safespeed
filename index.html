<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Utby AI | Cognitive Automotive Intelligence</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Plus+Jakarta+Sans:wght@200;500;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --ai-blue: #00f2ff;
            --ai-glow: rgba(0, 242, 255, 0.3);
            --bg: #020406;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(0, 242, 255, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            width: 100%; overflow-x: hidden; 
            background: var(--bg); color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        /* تأثير الشبكة العصبية في الخلفية */
        #neural-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; opacity: 0.4;
        }

        /* الهيدر الذكي */
        header {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: rgba(2, 4, 6, 0.7); backdrop-filter: blur(30px);
            padding: 15px 25px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }

        .system-status { display: flex; align-items: center; gap: 10px; font-size: 0.7rem; font-weight: 800; color: var(--ai-blue); }
        .status-dot { width: 6px; height: 6px; background: var(--ai-blue); border-radius: 50%; box-shadow: 0 0 10px var(--ai-blue); animation: blink 1s infinite; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* الهيرو - HUD Style */
        .hero {
            height: 100vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; text-align: center;
            padding: 20px; position: relative;
        }

        .hero h1 {
            font-family: 'Orbitron', sans-serif; font-size: clamp(2.5rem, 10vw, 5.5rem);
            font-weight: 900; letter-spacing: -2px; line-height: 0.9;
            background: linear-gradient(to bottom, #fff, var(--ai-blue));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        /* كرت التشخيص الذكي */
        .smart-card {
            width: min(900px, 95%); background: var(--glass);
            border: 1px solid var(--border); border-radius: 20px;
            padding: 40px; backdrop-filter: blur(20px);
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.05);
            margin-top: -50px;
        }

        .plate-ai-box {
            position: relative; margin-bottom: 30px;
        }

        .plate-ai-box input {
            width: 100%; background: rgba(0, 0, 0, 0.5); border: 2px solid var(--border);
            padding: 25px; border-radius: 12px; color: var(--ai-blue);
            font-family: 'Orbitron', sans-serif; font-size: 2rem; text-align: center;
            text-transform: uppercase; letter-spacing: 10px; transition: 0.3s;
        }

        .plate-ai-box input:focus { border-color: var(--ai-blue); outline: none; box-shadow: 0 0 30px var(--ai-glow); }

        /* بيانات المحرك التفاعلية */
        .engine-data {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
            margin-bottom: 20px; opacity: 0; transform: translateY(10px); transition: 0.5s;
        }

        .data-bit {
            background: rgba(255, 255, 255, 0.02); padding: 15px; border-radius: 8px;
            border: 1px solid var(--border); text-align: center;
        }

        .data-bit small { font-size: 0.6rem; color: var(--ai-blue); font-weight: 800; display: block; margin-bottom: 5px; }
        .data-bit span { font-family: 'Orbitron', sans-serif; font-size: 0.9rem; }

        /* زر الإطلاق */
        .btn-core {
            width: 100%; padding: 20px; background: var(--ai-blue); color: #000;
            border: none; border-radius: 12px; font-weight: 900; font-family: 'Orbitron', sans-serif;
            cursor: pointer; font-size: 1rem; text-transform: uppercase; letter-spacing: 2px;
            transition: 0.4s; position: relative; overflow: hidden;
        }

        .btn-core:hover { transform: scale(1.02); background: #fff; }

        /* الخدمات السينمائية */
        .smart-services { padding: 100px 25px; max-width: 1400px; margin: 0 auto; }
        .service-tile {
            position: relative; height: 400px; border-radius: 20px; overflow: hidden;
            border: 1px solid var(--border); margin-bottom: 30px;
        }

        .service-tile img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.6); }
        
        .tile-content {
            position: absolute; inset: 0; padding: 40px;
            display: flex; flex-direction: column; justify-content: flex-end;
            background: linear-gradient(to top, var(--bg), transparent);
        }

        /* فوتر */
        footer { padding: 50px; text-align: center; border-top: 1px solid var(--border); }

        /* استجابة الجوال */
        @media (max-width: 768px) {
            .hero h1 { font-size: 3rem; }
            .engine-data { grid-template-columns: 1fr; }
            .plate-ai-box input { font-size: 1.5rem; letter-spacing: 5px; }
        }
    </style>
</head>
<body>

    <canvas id="neural-bg"></canvas>

    <header>
        <div style="font-family: 'Orbitron'; font-weight: 900; font-size: 1.2rem;">UTBY <span style="color: var(--ai-blue);">AI</span></div>
        <div class="system-status">
            <span id="greeting">INITIATING...</span>
            <div class="status-dot"></div>
        </div>
    </header>

    <section class="hero">
        <p id="time-log" style="font-family: 'Orbitron'; color: var(--ai-blue); font-size: 0.7rem; margin-bottom: 10px;"></p>
        <h1>CORE<br>PRECISION.</h1>
        <p style="color: #8a8f98; max-width: 500px; margin-bottom: 40px;">Nästa generations bilservice drivs av data och perfektion.</p>
    </section>

    <div style="display: flex; justify-content: center;">
        <div class="smart-card">
            <div class="plate-ai-box">
                <input type="text" id="plateInput" placeholder="REG NR" maxlength="6" oninput="analyzeVehicle()">
            </div>

            <div class="engine-data" id="engineData">
                <div class="data-bit">
                    <small>VEHICLE ID</small>
                    <span id="v-model">---</span>
                </div>
                <div class="data-bit">
                    <small>HEALTH INDEX</small>
                    <span id="v-health">--%</span>
                </div>
                <div class="data-bit">
                    <small>EST. COST</small>
                    <span id="v-price">0 SEK</span>
                </div>
            </div>

            <button class="btn-core" onclick="initiateBooking()">Execute Service Booking</button>
        </div>
    </div>

    <section class="smart-services">
        <div class="service-tile">
            <img src="https://images.unsplash.com/photo-1625047509168-a7026f36de04?q=80&w=1500" alt="Tech">
            <div class="tile-content">
                <div class="status-dot"></div>
                <h2 style="font-family: 'Orbitron'; margin-bottom: 10px;">Quantum Diagnostics</h2>
                <p style="color: #a0aec0;">Vi skannar bilens alla system på nanosekunder.</p>
            </div>
        </div>
    </section>

    <footer>
        <p style="font-size: 0.7rem; color: var(--ai-blue); letter-spacing: 3px;">SYSTEM VERSION 4.0.2 // GOTHENBURG</p>
    </footer>

    <script>
        // 1. الترحيب الذكي بناءً على الوقت
        const hour = new Date().getHours();
        const greeting = hour < 12 ? "GOD MORGON" : hour < 18 ? "GOD DAG" : "GOD KVÄLL";
        document.getElementById('greeting').innerText = greeting + " GÖTEBORG";

        // 2. تحديث الوقت بشكل حي (HUD Style)
        setInterval(() => {
            const now = new Date();
            document.getElementById('time-log').innerText = `SYSTEM_TIME: ${now.toLocaleTimeString()} // ${now.toLocaleDateString()}`;
        }, 1000);

        // 3. تحليل ذكي للوحة (AI Simulator)
        function analyzeVehicle() {
            const val = document.getElementById('plateInput').value;
            const dataBox = document.getElementById('engineData');
            
            if(val.length >= 3) {
                dataBox.style.opacity = "1";
                dataBox.style.transform = "translateY(0)";
                
                // محاكاة استخراج بيانات
                document.getElementById('v-model').innerText = "V-CORE ACTIVE";
                document.getElementById('v-health').innerText = (Math.random() * (99 - 80) + 80).toFixed(1) + "%";
                document.getElementById('v-price').innerText = "1,495 SEK";
            } else {
                dataBox.style.opacity = "0";
            }
        }

        // 4. خلفية الشبكة العصبية (Canvas Animation)
        const canvas = document.getElementById('neural-bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];
        for(let i=0; i<50; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.5,
                vy: (Math.random() - 0.5) * 0.5
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00f2ff";
            ctx.strokeStyle = "rgba(0, 242, 255, 0.1)";
            
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy;
                if(p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if(p.y < 0 || p.y > canvas.height) p.vy *= -1;
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, 1, 0, Math.PI*2);
                ctx.fill();

                for(let j=i+1; j<particles.length; j++) {
                    let p2 = particles[j];
                    let dist = Math.hypot(p.x - p2.x, p.y - p2.y);
                    if(dist < 150) {
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    }
                }
            });
            requestAnimationFrame(draw);
        }
        draw();

        function initiateBooking() {
            const btn = event.target;
            btn.innerText = "PROCESSING DATA...";
            btn.style.boxShadow = "0 0 50px var(--ai-blue)";
            
            setTimeout(() => {
                alert("SYSTEM SECURE: Din bokningsförfrågan har analyserats. Vi kontaktar dig för bekräftelse.");
                btn.innerText = "EXECUTE SERVICE BOOKING";
                btn.style.boxShadow = "none";
            }, 2000);
        }
    </script>
</body>
</html>
